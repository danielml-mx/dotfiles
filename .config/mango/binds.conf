#################################
#          Keybindings          #
#   (combinaciones de teclas)   #
#################################

# key name refer to `xev` or `wev` command output,
# nombres de mods: super,ctrl,alt,shift,none

#################################
#   Funcionalidad del sistema   #
#################################

# Salir a TTY
bind=SUPER+SHIFT,q,quit

# Bloquear pantalla
bind=SUPER+SHIFT,l,spawn,lockscreen

# Controles de brillo
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s +2%
bind=SHIFT,XF86MonBrightnessUp,spawn,brightnessctl s 100%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 2%-
bind=SHIFT,XF86MonBrightnessDown,spawn,brightnessctl s 1%

# Controles de volumen
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=SHIFT,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle

# Controles de multimedia
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl prev
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
# (personal, mi laptop no cuenta con botones dedicados)
bind=SUPER,Right,spawn,playerctl next
bind=SUPER,Left,spawn,playerctl previous
bind=SUPER,down,spawn,playerctl play-pause

#################################
#      Funcionalidad de WM      #
#################################

# Recargar configuración
bind=SUPER,r,reload_config

# Cerrar ventana
bind=SUPER,q,killclient,

# Alternar entre los layouts del teclado
bind=SUPER,space,switch_keyboard_layout

#################################
#       Spawn de procesos       #
#################################

# Menu
bind=Alt,space,spawn,rofi -show drun

# Terminal
#bind=SUPER,Return,spawn,alacritty
bind=SUPER,Return,spawn,tabbed -c -r 2 st -w ''

# Navegador web
bind=SUPER,w,spawn,librewolf

# Manejador de contraseñas
bind=SUPER+SHIFT,p,spawn,passmenu-custom --type --delay 0 -c -l 20 -p '🔑: '

# Utilidad de screenshots
bind=SUPER+SHIFT,s,spawn,screenshot

#################################
#            Enfoque            #
#################################

# Siguiente/anterior ventana en stack
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev
bind=SUPER,Tab,focusstack,next
bind=SUPER+SHIFT,Tab,focusstack,prev

bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

bind=SUPER+SHIFT,j,exchange_stack_client,next
bind=SUPER+SHIFT,k,exchange_stack_client,prev


#################################
#       Estados de ventana      #
#################################

# Flotante
bind=SUPER+SHIFT,space,togglefloating,

# Fullscreen
bind=SUPER+SHIFT,f,togglefullscreen,
#bind=SUPER,f,togglefakefullscreen,

# Maximizar vista
#bind=ALT,a,togglemaximizescreen,

# Global/sticky
bind=SUPER+SHIFT,0,toggleglobal,

# Resaltado
bind=SUPER,o,toggleoverlay,



#################################
#     Movimiento de ventanas    #
#################################

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tagsilent,1,0
bind=SUPER+SHIFT,2,tagsilent,2,0
bind=SUPER+SHIFT,3,tagsilent,3,0
bind=SUPER+SHIFT,4,tagsilent,4,0
bind=SUPER+SHIFT,5,tagsilent,5,0
bind=SUPER+SHIFT,6,tagsilent,6,0
bind=SUPER+SHIFT,7,tagsilent,7,0
bind=SUPER+SHIFT,8,tagsilent,8,0
bind=SUPER+SHIFT,9,tagsilent,9,0

#################################
#   Funcionalidades de layouts  #
#################################

# Alternar entre layouts
#circle_layout=tile,scroller,monocle,grid,deck,center_tile,vertical_tile,right_tile,vertical_scroller,vertical_grid,vertical_deck,fair,vertical_fair
circle_layout=tile,scroller,monocle,deck
bind=SUPER,n,switch_layout

# Activar layout: Master (tile)
binds=SUPER,Escape,setlayout,tile

# Activar layout: Monocle
binds=SUPER,m,setlayout,monocle

# Activar layout: Deck
binds=SUPER,d,setlayout,deck

# Activar layout: Scroller
binds=SUPER,s,setlayout,scroller

# Scroller
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout(manual split mode)
bind=alt+shift,Return,dwindle_toggle_split_direction


#################################
#         Vistas de tags        #
#################################

# Llamar explícitamente según número
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Llamar según posición relativa
bind=SUPER+CTRL,h,viewtoleft,0
bind=SUPER+CTRL,l,viewtoright,0

#bind=CTRL,Left,viewtoleft_have_client,0
#bind=SUPER,Right,viewtoright,0
#bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0


# switch window status
bind=ALT,Tab,toggleoverview,

#################################
#          Scratchpads          #
#################################

# Minimizar/incluir en el stack de scratchpads
bind=SUPER,i,minimized,

# Alternar entre las ventanas del stack de scratchpads
bind=ALT,z,toggle_scratchpad

# Restaurar las ventanas minimizadas
# - Si fue llamada como scratchpad: se restaura en el tag actual
# - Si NO fue llamada como scratchpad: se restaura en su tag original
bind=SUPER+SHIFT,I,restore_minimized


# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
#mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

