#################################
#   Reglas de comportamiento    #
#################################

# Para ver todas las opciones de configuración
# disponibles visitar:
# - https://mangowm.github.io/docs/configuration/miscellaneous
# - https://mangowm.github.io/docs/window-management/rules

#################################
#      Sistema y hardware       #
#################################

# Mantener el proceso de xwayland aunque no existan
# procesos de X11 activos (reduce retraso de arranque)
xwayland_persistence=1

# Habilitar drm_syncobj (ayuda con lag en videojuegos)
syncobj_enable=0

# Permitir que el bloqueador de pantalla sea transparente
allow_lock_transparent=0

# Permitir que los procesos inhiban combinaciones de teclado
allow_shortcuts_inhibit=1

#################################
#       Enfoque e inputs        #
#################################

# Enfocar ventanas automáticamente cuando lo soliciten
focus_on_activate=1

# El cursor puede enfocar las ventanas
sloppyfocus=1

# Transportar el cursor al centro de la ventana al enfocar
# via combinación de teclas (predeterminado: 1)
warpcursor=0

# Esconder el cursor después de N segundos de inactividad
# (0 para deshabilitar)
cursor_hide_timeout=0

# Esconder el cursor al teclear (0 para deshabilitar)
cursor_hide_on_keypress=0

# Timeout para detectar eventos consecutivos de ejes/scrolling
axis_bind_apply_timeout=100

#################################
#           Ventanas            #
#################################

#### Preestablecidas ####

# Habilitar que las ventanas flotantes se transporten a las esquinas
# si están a cierta distancia de estas
enable_floating_snap=1

# Distancia máxima para el comportamiento antes mencionado
snap_distance=30

# Desactivar el borde de las ventanas cuando sean la única en su tag
no_border_when_single=1

# Permitir que procesos invisibles inhiban el idle/desenfoque
idleinhibit_ignore_visible=0

# Intervalo entre recargas de ventana cuando se arrastra una ventana
# del stack
drag_tile_refresh_interval=8.0

# Intervalo entre recargas de ventana cuando se arrastra una ventana
# flotante
drag_floating_refresh_interval=8.0

# Transportar el cursor al arrastrar ventanas para colocarlas en 
# tile
drag_warp_cursor=1

# Arrastrar una ventana tiled sobre otra intercambia sus posiciones
drag_tile_to_tile=1

# Permitir arrastrar temporalmente una ventana del stack para reducir
# su tamaño
drag_tile_small=1


#### Personalizables ####

# Formato:
# - windowrule=Parameter:Values,title:Values
# - windowrule=Parameter:Values,Parameter:Values,appid:Values,title:Values

# Window swallowing (con terminal)
windowrule=isterm:1,appid:tabbed

# No hacer swallow a este programa
windowrule=noswallow:1,appid:wev

# Deshabilitar decoraciones propias
windowrule=allow_csd:1,appid:librewolf

# Generar los recordatorios de Thunderbird en modo flotante
windowrule=isfloating:1,appid:org.mozilla.Thunderbird,title:*Reminder*

# Ignorar mpv cuando lo uso para la webcam
windowrule=isfloating:1,istagsilent:1,isunglobal:1,appid:mpv,title:Canon M50 - mpv

#################################
#             Tags              #
#################################

#### Preestablecidas ####
# Habilitar carrusel de tags (ciclar --> tag[9] + 1 = tag[1])
tag_carousel=0

#### Personalizables ####

# Formato:
# - tagrule=id:Values,Parameter:Values,Parameter:Values
# - tagrule=id:Values,monitor_name:eDP-1,Parameter:Values,Parameter:Values
# - tagrule=id:Values,monitor_make:xxx,monitor_model:xxx,Parameter:Values

# Establecer layout predeterminado según núm. de tag
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

#################################
#            Layers             #
#    (barras, menus, shells)    #
#################################

#### Personalizables ####

# Formato:
# - layerrule=layer_name:Values,Parameter:Values,Parameter:Values

# Animaciones especiales para menú rofi
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

#################################
#           Monitores           #
#################################

# Permitir que el enfoque cruce los límites de los monitores
focus_cross_monitor=0

# Permitir el intercambio de ventanas entre monitores
exchange_cross_monitor=0

# Permitir que el enfoque direccional cruce a otros tags
focus_cross_tag=0

# Seleccionar el tag actual lleva al tag anteriormente
# enfocado
view_current_to_back=0

# Compartir scratchpads a través de los monitores
scratchpad_cross_monitor=0

# Permitir sólo un scratchpad visible a la vez
single_scratchpad=1
