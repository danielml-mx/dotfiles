<?xml version='1.0'?>
<!-- https://www.linux-magazine.com/Online/Blogs/Off-the-Beat-Bruce-Byfield-s-Blog/Free-equivalents-for-standard-proprietary-fonts -->
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

  <match target="pattern">
    <test qual="any" name="family">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Cantarell</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>sans</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Cantarell</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Avenir Next LT Pro</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>system-ui</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Cantarell</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>ui-sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Cantarell</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Adwaita Sans</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Cantarell</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Nimbus Sans</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Cantarell</string>
    </edit>
  </match>
  <!-- Aliases for commonly used MS fonts. -->

  <match>
    <test name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Avenir Next LT Pro</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Avenir Next LT Pro</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Helvetica Neue</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Avenir Next LT Pro</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Verdana</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>RobotoMono Nerd Font Mono</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Tahoma</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Avenir Next LT Pro</string>
    </edit>
  </match>

  <match>
    <!-- Insert joke here -->
    <test name="family"><string>Comic Sans MS</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Times New Roman</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Avenir Next LT Pro</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Times</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Avenir Next LT Pro</string>
      <!-- <string>Noto Serif</string> -->
    </edit>
  </match>

  <match>
    <test name="family"><string>Courier New</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>RobotoMono Nerd Font Mono</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Cambria</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Cantarell</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Century Gothic</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Cantarell</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Questrial</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Cantarell</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Calibri</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Carlito</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Calibri Light</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Carlito</string>
    </edit>
  </match>

  <match>
    <test name="family"><string>Tenorite</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Cantarell</string>
    </edit>
  </match>
</fontconfig>
