#################################
#           Overview            #
#################################
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

#################################
#       Master Stack Layout     #
#################################

# Generar ventanas nuevas en el área principal
# (predeterminado: 1, apagado aparecen debajo de
# la enfocada)
new_is_master=0

# Porcentaje de la pantalla tomado por la ventana
# principal (predeterminado: 0.55)
default_mfact=0.50

# Núm. de ventanas en área principal
default_nmaster=1

# Deshabilitar gaps cuando sólo existe una ventana
smartgaps=0

# Centrar la ventana principal si es la única
center_when_single_stack=1

#################################
#       Scroller Layout     #
#################################

scroller_structs=20
scroller_default_proportion=0.9
scroller_focus_center=0
scroller_prefer_center=0
scroller_prefer_overspread=1
edge_scroller_pointer_focus=1
edge_scroller_focus_allow_speed=0.0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

#################################
#         Dwindle Layout        #
#################################

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

